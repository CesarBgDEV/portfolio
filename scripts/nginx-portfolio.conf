server {
    listen 80;
    listen [::]:80;
    server_name cesar-balderas.dev www.cesar-balderas.dev;
    return 301 https://cesar-balderas.dev$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.cesar-balderas.dev;
    ssl_certificate     /etc/letsencrypt/live/cesar-balderas.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cesar-balderas.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://cesar-balderas.dev$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cesar-balderas.dev;
    ssl_certificate     /etc/letsencrypt/live/cesar-balderas.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cesar-balderas.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
